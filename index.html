<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ARTOFIX 2.3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>

/* =========================================
   VARIABLES + THEMES
   ========================================= */
:root {
  --ac:   #00f0ff;
  --ac2:  #7b2fff;
  --acr:  0,240,255;
  --ac2r: 123,47,255;
  --red:  #ff1a4e;
  --redr: 255,26,78;
  --grn:  #00ffaa;
  --grnr: 0,255,170;
  --ylw:  #ffd000;
  --bg:   #04050f;
  --bg2:  #070818;
  --panelbg: rgba(4,5,15,0.97);
  --cardbg:  rgba(255,255,255,0.032);
  --cardbr:  rgba(255,255,255,0.075);
  --tx:   #cdd5f0;
  --tx2:  rgba(180,190,220,0.35);
  --font: 'Rajdhani',sans-serif;
  --mono: 'Share Tech Mono',monospace;
  --radius: 14px;
  --sidebar-w: 220px;
  --glow: 0 0 20px rgba(var(--acr),.35), 0 0 60px rgba(var(--acr),.1);
}

/* ── THEMES ── */
body.th-cyber   { --ac:#ff00e5; --ac2:#ffe600; --acr:255,0,229;   --ac2r:255,230,0;   }
body.th-hacker  { --ac:#00ff41; --ac2:#00aa22; --acr:0,255,65;    --ac2r:0,170,34;    --font:'Share Tech Mono',monospace; }
body.th-blood   { --ac:#ff2222; --ac2:#ff6600; --acr:255,34,34;   --ac2r:255,102,0;   --bg:#060001; --panelbg:rgba(8,1,1,0.97); }
body.th-ocean   { --ac:#00c8ff; --ac2:#0055ff; --acr:0,200,255;   --ac2r:0,85,255;    --bg:#00060f; --panelbg:rgba(0,5,16,0.97); }
body.th-gold    { --ac:#ffd000; --ac2:#ff8800; --acr:255,208,0;   --ac2r:255,136,0;   --bg:#070600; --panelbg:rgba(9,8,0,0.97); }
body.th-matrix  { --ac:#00ff41; --ac2:#003311; --acr:0,255,65;    --ac2r:0,51,17;     --bg:#000800; --panelbg:rgba(0,6,0,0.98); --font:'Share Tech Mono',monospace; }
body.th-rose    { --ac:#ff6eb4; --ac2:#c44dff; --acr:255,110,180; --ac2r:196,77,255;  --bg:#09010a; --panelbg:rgba(10,2,12,0.97); }
body.th-ice     { --ac:#80ffff; --ac2:#4488ff; --acr:128,255,255; --ac2r:68,136,255;  --bg:#010810; --panelbg:rgba(1,8,18,0.97); }
body.th-toxic   { --ac:#aaff00; --ac2:#ff8800; --acr:170,255,0;   --ac2r:255,136,0;   --bg:#030800; --panelbg:rgba(3,8,0,0.97); }

/* =========================================
   RESET
   ========================================= */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--tx); font-family:var(--font); }
button  { cursor:pointer; font-family:var(--font); }
input, select, textarea { font-family:var(--mono); user-select:text; cursor:text; }
select  { cursor:pointer; }

/* =========================================
   CANVAS + SCANLINES + NOISE
   ========================================= */
#bgcanvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
#scanlines {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.055) 2px, rgba(0,0,0,0.055) 4px
  );
}
/* Vignette overlay */
#scanlines::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.55) 100%);
}

/* =========================================
   APP SHELL
   ========================================= */
#app {
  position:relative; z-index:2; width:100vw; height:100vh;
  background:var(--panelbg); display:flex; flex-direction:column;
  animation: appBoot .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes appBoot {
  from { opacity:0; transform:scale(.975) translateY(8px); filter:blur(4px); }
  to   { opacity:1; transform:scale(1)    translateY(0);   filter:blur(0); }
}

/* =========================================
   TITLEBAR
   ========================================= */
#titlebar {
  height:44px; flex-shrink:0;
  background:rgba(0,0,0,.6);
  border-bottom:1px solid rgba(var(--acr),.1);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; -webkit-app-region:drag;
  position:relative; z-index:10; 
}
/* Gradient underline */
#titlebar::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px; pointer-events:none;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(var(--acr),.9) 30%,
    rgba(var(--ac2r),.6) 60%,
    transparent 100%
  );
}

/* Logo */
#logo {
  display:flex; align-items:center; gap:10px; -webkit-app-region:no-drag;
  font-family:'Orbitron',monospace; font-weight:900; font-size:12.5px;
  letter-spacing:3.5px; cursor:default; user-select:none;
}
#logo-box {
  width:28px; height:28px; border:1.5px solid rgba(var(--acr),.6);
  border-radius:7px; display:flex; align-items:center; justify-content:center;
  font-size:13px; position:relative; overflow:hidden;
  animation:logoGlow 4s ease-in-out infinite;
}
#logo-box::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(135deg, rgba(var(--acr),.15), transparent);
}
@keyframes logoGlow {
  0%,100% { box-shadow:0 0 8px rgba(var(--acr),.3); }
  50%     { box-shadow:0 0 22px rgba(var(--acr),.8), 0 0 44px rgba(var(--acr),.2); }
}
#logo .logo-accent { color:var(--ac); letter-spacing:1px; font-size:11px; opacity:.8; }

/* Window buttons */
#winbtns { -webkit-app-region:no-drag; display:flex; gap:5px; align-items:center; }
.winbtn {
  width:28px; height:28px; border-radius:7px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
  color:rgba(255,255,255,.3); font-size:11px;
  display:flex; align-items:center; justify-content:center;
  transition:all .18s; cursor:pointer;
}
.winbtn:hover { background:rgba(255,255,255,.1); color:#fff; transform:scale(1.08); }
#winbtn-close:hover {
  background:rgba(var(--redr),.22); border-color:rgba(var(--redr),.55);
  color:var(--red); box-shadow:0 0 12px rgba(var(--redr),.4);
}

/* =========================================
   LAYOUT
   ========================================= */
#main-layout { display:flex; flex:1; overflow:hidden; }

/* =========================================
   SIDEBAR
   ========================================= */
#sidebar {
  width:var(--sidebar-w); flex-shrink:0;
  background:rgba(0,0,0,.28);
  border-right:1px solid rgba(255,255,255,.04);
  display:flex; flex-direction:column;
  padding:12px 10px 10px; gap:2px;
  position:relative; overflow:hidden;
}
/* Sidebar accent line */
#sidebar::before {
  content:''; position:absolute; top:0; right:0; width:1px; height:100%; pointer-events:none;
  background:linear-gradient(180deg, transparent, rgba(var(--acr),.3) 40%, rgba(var(--ac2r),.2) 70%, transparent);
}

.nav-sep {
  font-size:8px; letter-spacing:3px; color:var(--tx2);
  padding:10px 10px 5px; text-transform:uppercase;
  font-family:var(--mono); position:relative;
}
.nav-sep::after {
  content:''; position:absolute; bottom:0; left:10px; right:10px; height:1px;
  background:rgba(255,255,255,.05);
}

.nav-btn {
  padding:10px 12px; border-radius:10px; background:transparent;
  color:var(--tx2); border:1px solid transparent;
  font-weight:600; font-size:12px; text-align:left;
  letter-spacing:.5px; display:flex; align-items:center; gap:9px;
  position:relative; overflow:hidden; transition:all .2s; width:100%;
}
.nav-btn .nav-icon { font-size:14px; flex-shrink:0; transition:transform .25s; }
.nav-btn:hover {
  background:rgba(255,255,255,.06); color:rgba(255,255,255,.85);
  transform:translateX(3px);
}
.nav-btn:hover .nav-icon { transform:scale(1.15); }
/* Ripple on click */
.nav-btn::after {
  content:''; position:absolute; inset:0; border-radius:10px; pointer-events:none;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(var(--acr),.18) 0%, transparent 70%);
  opacity:0; transition:opacity .4s;
}
.nav-btn:active::after { opacity:1; }

.nav-btn.is-active {
  background:linear-gradient(90deg, rgba(var(--acr),.1), rgba(var(--ac2r),.05));
  color:var(--ac); border-color:rgba(var(--acr),.2);
  box-shadow:inset 0 0 20px rgba(var(--acr),.05);
}
.nav-btn.is-active::before {
  content:''; position:absolute; left:0; top:15%; bottom:15%; width:3px; pointer-events:none;
  background:linear-gradient(180deg, var(--ac), var(--ac2));
  border-radius:0 2px 2px 0;
  box-shadow:0 0 12px rgba(var(--acr),.9), 0 0 24px rgba(var(--acr),.3);
}

/* =========================================
   STATUS BOX (sidebar bottom)
   ========================================= */
#status-box {
  margin-top:auto; padding:13px 12px;
  background:rgba(0,0,0,.45); border-radius:12px;
  border:1px solid rgba(var(--acr),.1);
  position:relative; overflow:hidden;
}
#status-box::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px; pointer-events:none;
  background:linear-gradient(90deg, transparent, rgba(var(--acr),.4), transparent);
}
.status-row { display:flex; align-items:center; gap:9px; margin-bottom:12px; }

#zapret-dot {
  width:9px; height:9px; border-radius:50%;
  background:rgba(255,255,255,.08); flex-shrink:0;
  border:1.5px solid rgba(255,255,255,.12); transition:all .5s;
}
#zapret-dot.is-on {
  background:var(--grn);
  border-color:var(--grn);
  box-shadow:0 0 10px rgba(var(--grnr),.9), 0 0 24px rgba(var(--grnr),.4);
  animation:dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100% { transform:scale(1); opacity:1; }
  50%     { transform:scale(1.25); opacity:.7; }
}

#zapret-label {
  font-size:8.5px; letter-spacing:2.5px; color:var(--tx2);
  font-family:var(--mono); transition:.4s;
}
#zapret-label.is-on { color:var(--grn); text-shadow:0 0 8px rgba(var(--grnr),.6); }

.status-btn {
  display:block; width:100%; padding:9px; border:none; border-radius:9px;
  font-size:9.5px; letter-spacing:1.5px; font-weight:700; text-transform:uppercase;
  font-family:var(--font); margin-bottom:6px; transition:all .22s; cursor:pointer;
  position:relative; overflow:hidden;
}
.status-btn:last-child { margin-bottom:0; }
.status-btn::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(135deg, rgba(255,255,255,.1), transparent);
  opacity:0; transition:.2s;
}
.status-btn:hover::before { opacity:1; }

.sb-start {
  background:linear-gradient(135deg, var(--ac), var(--ac2));
  color:#000; box-shadow:0 4px 16px rgba(var(--acr),.35);
}
.sb-start:hover {
  box-shadow:0 6px 28px rgba(var(--acr),.65), 0 0 40px rgba(var(--ac2r),.2);
  transform:translateY(-2px);
}
.sb-stop {
  background:rgba(var(--redr),.07); color:var(--red);
  border:1px solid rgba(var(--redr),.25);
}
.sb-stop:hover {
  background:rgba(var(--redr),.18);
  box-shadow:0 0 16px rgba(var(--redr),.35);
  transform:translateY(-1px);
}

/* =========================================
   CONTENT AREA
   ========================================= */
#content-area {
  flex:1; padding:24px 26px; overflow-y:auto; scroll-behavior:smooth;
}
#content-area::-webkit-scrollbar { width:4px; }
#content-area::-webkit-scrollbar-track { background:transparent; }
#content-area::-webkit-scrollbar-thumb {
  background:rgba(var(--acr),.2); border-radius:4px;
}
#content-area::-webkit-scrollbar-thumb:hover { background:rgba(var(--acr),.4); }

/* Tab animation — staggered entry */
.tab-page { animation:tabIn .32s cubic-bezier(.22,1,.36,1) both; }
@keyframes tabIn {
  from { opacity:0; transform:translateY(14px) scale(.99); filter:blur(2px); }
  to   { opacity:1; transform:translateY(0)     scale(1);  filter:blur(0); }
}

/* =========================================
   TYPOGRAPHY
   ========================================= */
.page-title {
  font-size:16px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase;
  margin-bottom:22px; display:flex; align-items:center; gap:12px;
  font-family:'Orbitron',monospace; animation:titleSlide .4s cubic-bezier(.22,1,.36,1);
}
@keyframes titleSlide { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
.page-title-accent { color:var(--ac); filter:drop-shadow(0 0 8px rgba(var(--acr),.6)); }
.page-title-line {
  flex:1; height:1px;
  background:linear-gradient(90deg, rgba(var(--acr),.3), rgba(var(--ac2r),.15), transparent);
}

.section-title {
  font-size:9.5px; letter-spacing:2.5px; color:var(--ac); text-transform:uppercase;
  margin-bottom:13px; font-family:var(--mono);
  text-shadow:0 0 10px rgba(var(--acr),.4);
}
.field-label {
  font-size:9.5px; color:var(--tx2); font-family:var(--mono);
  display:block; margin-bottom:5px; letter-spacing:.7px;
}

/* =========================================
   GRIDS
   ========================================= */
.grid-auto { display:grid; grid-template-columns:repeat(auto-fill,minmax(255px,1fr)); gap:14px; }
.grid-2    { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.grid-3    { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }

/* =========================================
   CARDS
   ========================================= */
.af-card {
  background:var(--cardbg); border:1px solid var(--cardbr);
  border-radius:var(--radius); padding:18px;
  position:relative; overflow:hidden;
  transition:border-color .25s, transform .25s, box-shadow .25s;
  
}
/* Top glow strip */
.af-card::after {
  content:''; position:absolute; top:0; left:15%; right:15%; height:1px;
  background:linear-gradient(90deg, transparent, rgba(var(--acr),.25), transparent);
  transition:.3s; pointer-events:none;
}
/* Radial hover glow */
.af-card::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(circle at 50% -10%, rgba(var(--acr),.07), transparent 65%);
  opacity:0; transition:.35s;
}
.af-card:hover {
  border-color:rgba(var(--acr),.22);
  transform:translateY(-4px);
  box-shadow:0 18px 40px rgba(0,0,0,.55), 0 0 0 1px rgba(var(--acr),.06);
}
.af-card:hover::before  { opacity:1; }
.af-card:hover::after   { background:linear-gradient(90deg,transparent,rgba(var(--acr),.5),transparent); }

/* =========================================
   BUTTONS
   ========================================= */
.btn {
  display:inline-block; padding:9px 15px; border:none; border-radius:9px;
  font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  font-family:var(--font); transition:all .22s; cursor:pointer;
  position:relative; overflow:hidden;
}
/* Shimmer effect on all buttons */
.btn::before {
  content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
  transition:left .45s ease; pointer-events:none;
}
.btn:hover::before { left:150%; }

.btn-primary {
  background:linear-gradient(135deg, var(--ac), var(--ac2));
  color:#000 !important;
  box-shadow:0 4px 14px rgba(var(--acr),.3);
}
.btn-primary:hover {
  box-shadow:0 6px 28px rgba(var(--acr),.6), 0 0 40px rgba(var(--ac2r),.15);
  transform:translateY(-2px);
}
.btn-primary:active { transform:translateY(0); box-shadow:0 2px 8px rgba(var(--acr),.3); }

.btn-secondary {
  background:rgba(255,255,255,.06); color:rgba(255,255,255,.8) !important;
  border:1px solid rgba(255,255,255,.1);
}
.btn-secondary:hover {
  background:rgba(255,255,255,.11); color:#fff !important;
  border-color:rgba(255,255,255,.22);
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}

.btn-danger {
  background:rgba(var(--redr),.08); color:var(--red) !important;
  border:1px solid rgba(var(--redr),.28);
}
.btn-danger:hover {
  background:rgba(var(--redr),.2);
  box-shadow:0 0 18px rgba(var(--redr),.4);
  transform:translateY(-1px);
}

.btn-full { width:100%; display:block; text-align:center; margin-bottom:8px; }
.btn-full:last-child { margin-bottom:0; }

/* GLOW button variant */
.btn-glow {
  background:transparent; color:var(--ac) !important;
  border:1px solid rgba(var(--acr),.4);
  box-shadow:0 0 12px rgba(var(--acr),.15), inset 0 0 12px rgba(var(--acr),.04);
}
.btn-glow:hover {
  background:rgba(var(--acr),.08);
  border-color:rgba(var(--acr),.7);
  box-shadow:0 0 24px rgba(var(--acr),.4), inset 0 0 20px rgba(var(--acr),.08);
  transform:translateY(-2px);
}

/* =========================================
   INPUTS
   ========================================= */
.af-input {
  width:100%; padding:10px 14px; border-radius:9px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(0,0,0,.55); color:#fff; font-size:12.5px;
  outline:none; font-family:var(--mono); transition:all .22s;
  display:block; margin-bottom:9px;
}
.af-input:focus {
  border-color:rgba(var(--acr),.6);
  box-shadow:0 0 0 3px rgba(var(--acr),.1), 0 0 16px rgba(var(--acr),.12);
  background:rgba(0,0,0,.65);
}
.af-input::placeholder { color:rgba(255,255,255,.2); }
select.af-input { cursor:pointer; }
select.af-input option { background:#0d0f1e; }

/* =========================================
   DATA ROWS
   ========================================= */
.data-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 0; border-bottom:1px solid rgba(255,255,255,.04);
  transition:background .2s;
}
.data-row:last-child { border-bottom:none; }
.data-row:hover { background:rgba(var(--acr),.03); margin:0 -6px; padding:9px 6px; border-radius:6px; }
.data-label { color:var(--tx2); font-family:var(--mono); font-size:10px; }
.data-value { color:var(--ac); font-weight:700; font-family:var(--mono); font-size:10.5px; }

/* =========================================
   PROFILE CARDS
   ========================================= */
.profile-card {
  background:var(--cardbg); border:1px solid var(--cardbr);
  border-radius:var(--radius); padding:14px;
  display:flex; align-items:center; gap:13px;
  transition:all .22s; cursor:pointer; position:relative; overflow:hidden;
}
.profile-card::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(135deg, rgba(var(--acr),.04), transparent);
  opacity:0; transition:.25s;
}
.profile-card:hover {
  border-color:rgba(var(--acr),.28);
  transform:translateY(-3px) scale(1.01);
  box-shadow:0 12px 30px rgba(0,0,0,.5);
}
.profile-card:hover::before { opacity:1; }

.profile-ava {
  width:42px; height:42px; border-radius:10px; flex-shrink:0;
  background:linear-gradient(135deg, rgba(var(--acr),.15), rgba(var(--ac2r),.15));
  border:1px solid rgba(var(--acr),.25);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; transition:transform .25s;
}
.profile-card:hover .profile-ava { transform:scale(1.08) rotate(-3deg); }
.profile-name { font-size:13px; font-weight:700; margin-bottom:2px; }
.profile-meta { font-size:10px; color:var(--tx2); font-family:var(--mono); }
.profile-del {
  margin-left:auto; width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:rgba(var(--redr),.05); border:1px solid rgba(var(--redr),.15);
  color:rgba(var(--redr),.45); font-size:13px;
  display:flex; align-items:center; justify-content:center; transition:.18s; cursor:pointer;
}
.profile-del:hover {
  background:rgba(var(--redr),.22); color:var(--red);
  box-shadow:0 0 12px rgba(var(--redr),.3);
  transform:scale(1.1);
}
.profile-add {
  border:1px dashed rgba(255,255,255,.1); border-radius:var(--radius);
  padding:20px; display:flex; align-items:center; justify-content:center;
  gap:10px; color:var(--tx2); font-size:11px; letter-spacing:1px;
  transition:all .22s; cursor:pointer; min-height:72px;
  flex-direction:column;
}
.profile-add:hover {
  border-color:rgba(var(--acr),.4); color:var(--ac);
  background:rgba(var(--acr),.04);
  box-shadow:inset 0 0 30px rgba(var(--acr),.04);
  transform:translateY(-2px);
}

/* =========================================
   THEME SELECTOR CARDS (new)
   ========================================= */
.theme-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
}
.theme-card {
  border-radius:10px; padding:11px 8px; cursor:pointer;
  border:1.5px solid rgba(255,255,255,.08); transition:all .22s;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  font-size:9px; letter-spacing:1px; font-family:var(--mono);
  color:rgba(255,255,255,.55); position:relative; overflow:hidden;
}
.theme-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px; pointer-events:none;
  border-radius:2px 2px 0 0; transition:.2s;
}
.theme-card:hover { transform:translateY(-3px); color:#fff; }
.theme-card.is-active { border-color:rgba(255,255,255,.3); color:#fff; }

.tc-default { background:rgba(0,240,255,.06); }
.tc-default::before { background:linear-gradient(90deg,#00f0ff,#7b2fff); }
.tc-cyber   { background:rgba(255,0,229,.06); }
.tc-cyber::before   { background:linear-gradient(90deg,#ff00e5,#ffe600); }
.tc-hacker  { background:rgba(0,255,65,.06); }
.tc-hacker::before  { background:linear-gradient(90deg,#00ff41,#007a1f); }
.tc-blood   { background:rgba(255,34,34,.06); }
.tc-blood::before   { background:linear-gradient(90deg,#ff2222,#ff6600); }
.tc-ocean   { background:rgba(0,200,255,.06); }
.tc-ocean::before   { background:linear-gradient(90deg,#00c8ff,#0055ff); }
.tc-gold    { background:rgba(255,208,0,.06); }
.tc-gold::before    { background:linear-gradient(90deg,#ffd000,#ff8800); }
.tc-matrix  { background:rgba(0,255,65,.06); }
.tc-matrix::before  { background:linear-gradient(90deg,#00ff41,#003311); }
.tc-rose    { background:rgba(255,110,180,.06); }
.tc-rose::before    { background:linear-gradient(90deg,#ff6eb4,#c44dff); }
.tc-ice     { background:rgba(128,255,255,.06); }
.tc-ice::before     { background:linear-gradient(90deg,#80ffff,#4488ff); }
.tc-toxic   { background:rgba(170,255,0,.06); }
.tc-toxic::before   { background:linear-gradient(90deg,#aaff00,#ff8800); }

/* =========================================
   RANGE SLIDER
   ========================================= */
.range-row { display:flex; align-items:center; gap:10px; margin:6px 0 13px; }
.range-row label { font-size:10px; color:var(--tx2); font-family:var(--mono); min-width:90px; }
.range-row input[type=range] {
  flex:1; -webkit-appearance:none; height:4px; border-radius:4px;
  background:rgba(255,255,255,.1); outline:none; cursor:pointer;
  transition:background .2s;
}
.range-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
  background:var(--ac); box-shadow:0 0 10px rgba(var(--acr),.8); cursor:pointer;
  transition:transform .15s;
}
.range-row input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.2); }
.range-val { font-size:10px; color:var(--ac); font-family:var(--mono); min-width:36px; text-align:right; }

/* =========================================
   COLOR ROW
   ========================================= */
.color-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 0; border-bottom:1px solid rgba(255,255,255,.04);
}
.color-row label { font-size:10.5px; color:var(--tx2); font-family:var(--mono); }
.color-row input[type=color] {
  width:44px; height:30px; border:1.5px solid rgba(255,255,255,.12);
  border-radius:8px; background:none; padding:2px; cursor:pointer; transition:.18s;
}
.color-row input[type=color]:hover { border-color:rgba(var(--acr),.6); transform:scale(1.05); }

/* =========================================
   TOASTS
   ========================================= */
#toasts {
  position:fixed; bottom:18px; right:18px;
  display:flex; flex-direction:column-reverse; gap:7px;
  z-index:8000; pointer-events:none;
}
.toast {
  background:rgba(4,5,18,.97); border:1px solid rgba(255,255,255,.1);
  border-left:3px solid var(--ac); padding:11px 16px; border-radius:10px;
  color:#fff; font-size:11.5px; font-weight:600; font-family:var(--font);
  box-shadow:0 8px 28px rgba(0,0,0,.7), 0 0 20px rgba(var(--acr),.08);
  animation:toastIn .32s cubic-bezier(.22,1,.36,1);
  
}
.toast.toast-err { border-left-color:var(--red); box-shadow:0 8px 28px rgba(0,0,0,.7),0 0 20px rgba(var(--redr),.12); }
.toast.toast-ok  { border-left-color:var(--grn); box-shadow:0 8px 28px rgba(0,0,0,.7),0 0 20px rgba(var(--grnr),.12); }
@keyframes toastIn {
  from { opacity:0; transform:translateX(44px) scale(.9); }
  to   { opacity:1; transform:translateX(0)    scale(1); }
}

/* =========================================
   MODAL
   ========================================= */
#modal-overlay {
  position:fixed; inset:0; z-index:8888; background:rgba(0,0,0,.8);
  display:none; align-items:center; justify-content:center;
  
}
#modal-overlay.is-open { display:flex; }
.modal-box {
  background:rgba(6,7,20,.99); border:1px solid rgba(var(--acr),.22);
  border-radius:18px; padding:28px 28px 22px; width:440px; max-width:92vw;
  box-shadow:0 24px 80px rgba(0,0,0,.9), 0 0 0 1px rgba(var(--acr),.06), var(--glow);
  animation:modalIn .25s cubic-bezier(.22,1,.36,1);
  position:relative; overflow:hidden;
}
.modal-box::before {
  content:''; position:absolute; top:0; left:20%; right:20%; height:1px; pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(var(--acr),.6),transparent);
}
@keyframes modalIn {
  from { opacity:0; transform:scale(.92) translateY(12px); }
  to   { opacity:1; transform:scale(1)   translateY(0); }
}
.modal-title {
  font-size:14px; font-weight:700; letter-spacing:1.5px;
  font-family:'Orbitron',monospace; color:var(--ac);
  margin-bottom:18px; display:flex; align-items:center; gap:9px;
}
.modal-close {
  margin-left:auto; width:26px; height:26px; border-radius:7px; cursor:pointer;
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.35); display:flex; align-items:center; justify-content:center;
  font-size:13px; transition:.18s;
}
.modal-close:hover { background:rgba(var(--redr),.22); color:var(--red); border-color:rgba(var(--redr),.4); }

/* =========================================
   BIND CARDS
   ========================================= */
.bind-card {
  background:var(--cardbg); border:1px solid var(--cardbr);
  border-radius:12px; padding:13px 15px;
  display:flex; align-items:center; gap:12px;
  cursor:pointer; transition:all .22s; position:relative; overflow:hidden;
}
.bind-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px; pointer-events:none;
  background:linear-gradient(180deg, var(--ac), var(--ac2));
  border-radius:0 2px 2px 0; opacity:0; transition:.2s;
}
.bind-card:hover { border-color:rgba(var(--acr),.25); transform:translateY(-2px); }
.bind-card:hover::before { opacity:1; }

/* =========================================
   BADGE
   ========================================= */
.badge {
  font-size:8px; letter-spacing:1.5px; padding:2px 7px; border-radius:4px;
  font-family:var(--mono); font-weight:700; text-transform:uppercase;
}
.badge-bypass { background:rgba(var(--acr),.12); color:var(--ac); border:1px solid rgba(var(--acr),.25); }
.badge-direct { background:rgba(255,255,255,.06); color:var(--tx2); border:1px solid rgba(255,255,255,.1); }

/* =========================================
   HOME ZAPRET STATUS CHIP
   ========================================= */
.zapret-chip {
  display:inline-flex; align-items:center; gap:8px;
  padding:8px 16px; border-radius:30px;
  border:1px solid rgba(var(--acr),.2);
  background:rgba(var(--acr),.05);
  font-family:var(--mono); font-size:11px; letter-spacing:2px;
  transition:all .3s;
}
.zapret-chip .chip-dot {
  width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.2); transition:.3s;
}
.zapret-chip.online { border-color:rgba(var(--grnr),.35); background:rgba(var(--grnr),.06); }
.zapret-chip.online .chip-dot { background:var(--grn); box-shadow:0 0 8px rgba(var(--grnr),.8); animation:dotPulse 2s infinite; }

/* =========================================
   QUICK LAUNCH SITE CARDS
   ========================================= */
.site-card {
  background:var(--cardbg); border:1px solid var(--cardbr);
  border-radius:var(--radius); padding:16px 18px;
  position:relative; overflow:hidden; transition:all .22s;
}
.site-card-header {
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
}
.site-icon {
  width:36px; height:36px; border-radius:9px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:20px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
}
.site-name { font-size:14px; font-weight:700; letter-spacing:.5px; }

/* =========================================
   GLOW DIVIDER
   ========================================= */
.glow-sep {
  height:1px; margin:18px 0;
  background:linear-gradient(90deg, transparent, rgba(var(--acr),.25), rgba(var(--ac2r),.15), transparent);
}

/* =========================================
   MATRIX RAIN (special canvas layer)
   ========================================= */
#matrix-canvas {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  opacity:0; transition:opacity 1s;
}
body.th-matrix #matrix-canvas { opacity:.18; }
body.th-hacker #matrix-canvas { opacity:.12; }

/* =========================================
   STAGGER ANIMATION HELPERS
   ========================================= */
.stagger > * { animation:staggerIn .35s cubic-bezier(.22,1,.36,1) both; }
.stagger > *:nth-child(1)  { animation-delay:.04s; }
.stagger > *:nth-child(2)  { animation-delay:.08s; }
.stagger > *:nth-child(3)  { animation-delay:.12s; }
.stagger > *:nth-child(4)  { animation-delay:.16s; }
.stagger > *:nth-child(5)  { animation-delay:.20s; }
.stagger > *:nth-child(6)  { animation-delay:.24s; }
@keyframes staggerIn {
  from { opacity:0; transform:translateY(12px) scale(.97); }
  to   { opacity:1; transform:translateY(0)     scale(1); }
}
/* =========================================
   DIAG ROWS
   ========================================= */
.diag-row {
  display:flex; align-items:center; gap:12px;
  padding:8px 12px; border-radius:8px;
  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
  transition:.2s;
}
.diag-row:hover { background:rgba(255,255,255,.05); }
.diag-icon { font-size:15px; flex-shrink:0; width:20px; text-align:center; }
.diag-name { flex:1; font-size:11px; font-weight:700; color:var(--tx); font-family:var(--mono); }
.diag-ver  { font-size:10px; color:var(--tx2); font-family:var(--mono); min-width:90px; text-align:right; }
.diag-status { font-size:10px; font-family:var(--mono); min-width:70px; text-align:right; font-weight:700; }
.diag-status.ok   { color:var(--grn); }
.diag-status.warn { color:#ffd000; }
.diag-status.err  { color:var(--red); }
.diag-status.wait { color:var(--ac); }
.diag-row-placeholder { font-size:11px; color:var(--tx2); font-family:var(--mono); padding:10px 0; text-align:center; }
.diag-log-ok   { color:var(--grn); }
.diag-log-warn { color:#ffd000; }
.diag-log-err  { color:var(--red); }
.diag-log-info { color:var(--tx2); }
.diag-log-step { color:var(--ac); font-weight:700; }

/* =========================================
   HOME SITE CARDS
   ========================================= */
.home-site-card { padding:14px 16px; }
.home-site-name {
  font-size:12px; font-weight:700; letter-spacing:.5px;
  color:var(--tx); margin-bottom:10px; font-family:var(--font);
}
.home-site-btns { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.home-site-btns button {
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.7); border-radius:6px; padding:5px 8px;
  font-size:10px; font-family:var(--mono); cursor:pointer; transition:all .18s;
}
.home-site-btns button:hover {
  background:rgba(var(--acr),.12); border-color:rgba(var(--acr),.3);
  color:var(--ac);
}
.home-site-btns button:active { transform:scale(.97); }
.toggle-sw { position:relative; display:inline-block; width:38px; height:22px; flex-shrink:0; }
.toggle-sw input { opacity:0; width:0; height:0; }
.toggle-knob {
  position:absolute; inset:0; border-radius:22px; cursor:pointer;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15);
  transition:all .25s;
}
.toggle-knob::before {
  content:''; position:absolute; left:3px; top:50%; transform:translateY(-50%);
  width:14px; height:14px; border-radius:50%; background:rgba(255,255,255,.4);
  transition:all .25s;
}
.toggle-sw input:checked + .toggle-knob {
  background:rgba(var(--acr),.25); border-color:rgba(var(--acr),.5);
  box-shadow:0 0 10px rgba(var(--acr),.3);
}
.toggle-sw input:checked + .toggle-knob::before {
  left:calc(100% - 17px); background:var(--ac);
  box-shadow:0 0 8px rgba(var(--acr),.8);
}

/* =========================================
   CHEBURNET STATUS
   ========================================= */
.cbn-test-row {
  display:flex; align-items:center; gap:9px; padding:6px 10px;
  border-radius:8px; background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06); font-family:var(--mono); font-size:10.5px;
  transition:all .25s;
}
.cbn-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
  background:rgba(255,255,255,.2); transition:all .4s;
}
.cbn-dot.ok   { background:var(--grn); box-shadow:0 0 8px rgba(var(--grnr),.8); }
.cbn-dot.err  { background:var(--red); box-shadow:0 0 8px rgba(var(--redr),.8); }
.cbn-dot.wait { background:var(--ylw); animation:dotPulse 1s infinite; }

</style>
</head>

<script>
'use strict';

// ── ПЕРЕХВАТ ОШИБОК (убери после отладки) ──
window.onerror = function(msg, src, line, col, err) {
  var d = document.createElement('div');
  d.style = 'position:fixed;top:50px;left:50%;transform:translateX(-50%);background:#ff1a4e;color:#fff;padding:14px 20px;border-radius:10px;z-index:99999;font-family:monospace;font-size:12px;max-width:80vw;word-break:break-all;box-shadow:0 4px 20px rgba(0,0,0,.8)';
  d.textContent = '⚠ JS ERROR: ' + msg + '\nLine: ' + line + '\nFile: ' + (src||'').split('/').pop();
  document.body.appendChild(d);
  setTimeout(function(){ d.remove(); }, 15000);
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  window.onerror('Promise: ' + (e.reason && e.reason.message || e.reason), '', 0);
});

// ── IPC ──
var ipc, shell;
try {
  var _electron = require('electron');
  ipc   = _electron.ipcRenderer;
  shell = _electron.shell;
} catch(e) {
  // Фолбэк для браузерного превью
  ipc   = { invoke: function(){ return Promise.resolve({}); }, send: function(){}, on: function(){} };
  shell = { openExternal: function(){}, openPath: function(){} };
  console.warn('Electron IPC недоступен:', e.message);
}

// ── PARTICLE CANVAS (multi-mode) ──
try { (function() {
  var cv  = document.getElementById('bgcanvas');
  var ctx = cv.getContext('2d');
  var W, H, pts = [], mode = 'net', spd = 0.5;
  var mouse = { x: -999, y: -999 };

  window.CANVAS_API = {
    setMode: function(m) { mode = m; resize(); },
    setSpeed: function(s) { spd = parseFloat(s) || 0.5; },
  };

  document.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });

  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
    pts = [];
    if (mode === 'stars') {
      for (var i = 0; i < 160; i++) pts.push({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.8+.4, twinkle: Math.random()*Math.PI*2,
        speed: (Math.random()-.5)*.4,
      });
    } else if (mode === 'dots') {
      for (var i = 0; i < 70; i++) pts.push({
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-.5)*spd, vy: (Math.random()-.5)*spd,
        r: Math.random()*2+.8,
      });
    } else if (mode !== 'none') { // net
      var cols = Math.ceil(W/55), rows = Math.ceil(H/55);
      for (var i = 0; i < cols; i++) for (var j = 0; j < rows; j++) pts.push({
        x: i*55+27, y: j*55+27, ox: i*55+27, oy: j*55+27,
        vx: (Math.random()-.5)*spd, vy: (Math.random()-.5)*spd,
      });
    }
  }
  window.addEventListener('resize', resize);
  resize();

  function draw() {
    try {
      ctx.clearRect(0, 0, W, H);
      if (mode === 'none') { requestAnimationFrame(draw); return; }
      var rgb = getComputedStyle(document.documentElement).getPropertyValue('--acr').trim() || '0,240,255';

      if (mode === 'stars') {
        var t = Date.now() / 1000;
        pts.forEach(function(p) {
          p.twinkle += .025 * spd;
          var alpha = .4 + Math.sin(p.twinkle) * .35;
          var dx = p.x - mouse.x, dy = p.y - mouse.y, dist = Math.sqrt(dx*dx+dy*dy);
          if (dist < 100 && dist > 0) { p.x += dx/dist*1.5; p.y += dy/dist*1.5; }
          p.x += Math.sin(t * Math.abs(p.speed) * .6 + p.twinkle) * .15 * spd;
          p.y += Math.cos(t * Math.abs(p.speed) * .4 + p.twinkle) * .12 * spd;
          if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
          ctx.fillStyle = 'rgba('+rgb+','+alpha.toFixed(2)+')';
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        });
      } else if (mode === 'dots') {
        pts.forEach(function(p) {
          p.x += p.vx * spd; p.y += p.vy * spd;
          if (p.x < 0 || p.x > W) p.vx *= -1;
          if (p.y < 0 || p.y > H) p.vy *= -1;
          var dx = p.x-mouse.x, dy=p.y-mouse.y, dist=Math.sqrt(dx*dx+dy*dy);
          if (dist<80 && dist>0) { p.x += dx/dist*2; p.y += dy/dist*2; }
          ctx.fillStyle = 'rgba('+rgb+',.35)';
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        });
        ctx.lineWidth = .7;
        for (var i=0; i<pts.length; i++) for (var j=i+1; j<pts.length; j++) {
          var dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
          if (d<120) { ctx.strokeStyle='rgba('+rgb+','+(1-d/120)*.18+')'; ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.stroke(); }
        }
      } else { // net
        for (var k=0; k<pts.length; k++) {
          pts[k].x += pts[k].vx * spd; pts[k].y += pts[k].vy * spd;
          if (Math.abs(pts[k].x-pts[k].ox)>9) pts[k].vx*=-1;
          if (Math.abs(pts[k].y-pts[k].oy)>9) pts[k].vy*=-1;
          var dx=pts[k].x-mouse.x, dy=pts[k].y-mouse.y, dist=Math.sqrt(dx*dx+dy*dy);
          if (dist<70 && dist>0) { pts[k].x+=dx/dist*1.5; pts[k].y+=dy/dist*1.5; }
        }
        ctx.lineWidth = .8;
        for (var i=0; i<pts.length; i++) for (var j=i+1; j<pts.length; j++) {
          var dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
          if (d<90) { ctx.strokeStyle='rgba('+rgb+','+(1-d/90)*.2+')'; ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.stroke(); }
        }
        ctx.fillStyle='rgba('+rgb+',.18)';
        pts.forEach(function(p){ ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fill(); });
      }
    } catch(e) {}
    requestAnimationFrame(draw);
  }
  draw();
})(); } catch(e) { console.warn('[canvas]', e); }

// ── TOAST ──
function showToast(msg, type) {
  var container = document.getElementById('toasts');
  var el = document.createElement('div');
  el.className = 'toast' + (type === 'err' ? ' toast-err' : type === 'ok' ? ' toast-ok' : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(function() {
    el.style.transition = '.28s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(34px)';
    setTimeout(function(){ el.remove(); }, 300);
  }, 2800);
}

function goTab(tabName, btn) {
  var area = document.getElementById('content-area');
  var tpl  = document.getElementById('tpl-' + tabName);
  if (!tpl) {
    showToast('Шаблон не найден: tpl-' + tabName, 'err');

  }

  var navBtns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < navBtns.length; i++) {
    navBtns[i].classList.remove('is-active');

  if (btn) btn.classList.add('is-active');

  // tab-specific init
  if (tabName === 'profiles') renderProfiles();

  if (tabName === 'binds')         renderBinds();

// bypass=true/false — запускать ли zapret перед открытием
async function launchBrowser(url, profile, browser, bypass) {
  if (browser === 'app') {
    // запуск приложения/ярлыка напрямую
    try {
      shell.openPath(url);
      showToast('▶ Приложение запущено', 'ok');
    } catch(e) { showToast('Ошибка: ' + e.message, 'err'); }
    return;
  }
  if (bypass && !zapretActive) {
    showToast('⚠ Запрет не активен — запуск без обхода', '');
  }
  try {
    var res = await ipc.invoke('launch-browser', { url: url, profile: profile, browser: browser });
    if (res && res.ok) showToast('▶ ' + browser + ': ' + profile, 'ok');
    else showToast('Ошибка: ' + (res ? res.msg : '?'), 'err');
  } catch(e) {
    showToast('IPC ошибка: ' + e.message, 'err');
  }
}

function launchFromBinds() {
  var urlEl    = document.getElementById('bind-url');
  var profEl   = document.getElementById('bind-profile');
  var broEl    = document.getElementById('bind-browser');
  var bypassEl = document.getElementById('bind-bypass');
  var url      = urlEl    ? urlEl.value.trim()    : '';
  var prof     = profEl   ? profEl.value.trim()   : '';
  var bro      = broEl    ? broEl.value            : 'chrome';
  var bypass   = bypassEl ? bypassEl.value === '1' : true;
  if (!url) { showToast('Заполни URL или путь', 'err'); return; }
  if (bro !== 'app' && !prof) { showToast('Заполни имя профиля', 'err'); return; }
  launchBrowser(url, prof || 'default', bro, bypass);
}

async function submitCreateProfile() {
  var nameEl = document.getElementById('mp-name');
  var noteEl = document.getElementById('mp-note');
  var name   = nameEl ? nameEl.value.trim() : '';
  var note   = noteEl ? noteEl.value.trim() : '';

  var safe = name.replace(/[^a-zA-Z0-9_\-]/g, '');

  try {
    var res = await ipc.invoke('create-profile', safe);
    if (res && res.ok) {
      // сохраняем мета: браузер + заметка
      await ipc.invoke('write-profile-meta', safe, { browser: _selectedBrowser, note: note, created: new Date().toISOString() });
      PROFILE_META_CACHE[safe] = { browser: _selectedBrowser, note: note };
      closeModal();
      showToast('✅ Профиль "' + safe + '" создан (' + _selectedBrowser + ')', 'ok');
      renderProfiles();
    } else {
      showToast('Ошибка: ' + (res ? res.msg : '?'), 'err');

}

  try {
    var res = await ipc.invoke('delete-profile', name);
    if (res && res.ok) {
      delete PROFILE_META_CACHE[name];
      showToast('"' + name + '" удалён', 'err');
      renderProfiles();
    }
    else showToast('Ошибка: ' + (res ? res.msg : '?'), 'err');
  } catch(e) { showToast('IPC ошибка', 'err'); }
}

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return r + ',' + g + ',' + b;
}

function applyColors(ac, ac2, opacity) {
  var s = document.documentElement.style;
  s.setProperty('--ac',   ac);
  s.setProperty('--acr',  hexToRgb(ac));
  s.setProperty('--ac2',  ac2);
  s.setProperty('--ac2r', hexToRgb(ac2));
  s.setProperty('--panelbg', 'rgba(5,7,18,' + opacity + ')');
}

var matrixRAF = null, matrixCols = [];
function initMatrixCanvas() {
  var c = document.getElementById('matrix-canvas');
  if (!c) return;
  c.width = window.innerWidth; c.height = window.innerHeight;
  var ctx = c.getContext('2d');
  var colW = 16;
  var cols = Math.floor(c.width / colW);
  matrixCols = Array.from({length:cols}, () => Math.random() * c.height);
  if (matrixRAF) cancelAnimationFrame(matrixRAF);
  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,.05)';
    ctx.fillRect(0,0,c.width,c.height);
    var ac = getComputedStyle(document.body).getPropertyValue('--ac').trim() || '#00ff41';
    ctx.fillStyle = ac; ctx.font = '14px Share Tech Mono';
    matrixCols.forEach(function(y,i) {
      ctx.fillText(String.fromCharCode(0x30A0 + Math.floor(Math.random()*96)), i*colW, y);
      if (y > c.height && Math.random() > .975) matrixCols[i] = 0;
      else matrixCols[i] = y + colW;
    });
    matrixRAF = requestAnimationFrame(draw);
  }
  draw();
}
function stopMatrixCanvas() {
  if (matrixRAF) { cancelAnimationFrame(matrixRAF); matrixRAF = null; }
  var c = document.getElementById('matrix-canvas');
  if (c) { var ctx = c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); }
}
window.addEventListener('resize', function() {
  var c = document.getElementById('matrix-canvas');
  if (c) { c.width = window.innerWidth; c.height = window.innerHeight; }
});

function setTheme(cls) {
  var THEMES = ['th-cyber','th-hacker','th-blood','th-ocean','th-gold','th-matrix','th-rose','th-ice','th-toxic'];
  // Сохраняем пользовательские CSS переменные
  var s = document.documentElement.style;
  var hadCustom = s.getPropertyValue('--ac');
  THEMES.forEach(function(t){ document.body.classList.remove(t); });
  if (cls) document.body.classList.add(cls);

  saveSettings();

  if (cls === 'th-matrix' || cls === 'th-hacker') initMatrixCanvas();
  else stopMatrixCanvas();
  // Подсветка карточки
  document.querySelectorAll('.theme-card').forEach(function(el) {
    el.classList.remove('is-active');
    if (el.id === 'tc-' + cls) el.classList.add('is-active');
  });

}

function applyGlow(val) {
  var i = val / 100;
  document.documentElement.style.setProperty('--glow',
    '0 0 ' + Math.round(20*i) + 'px rgba(var(--acr),' + (.35*i).toFixed(2) + '),' +
    '0 0 ' + Math.round(60*i) + 'px rgba(var(--acr),' + (.1*i).toFixed(2) + ')'
  );
  APP_SETTINGS.glowIntensity = val;
  saveSettings();
}

function applyFont(font) {
  document.documentElement.style.setProperty('--font', font);
  APP_SETTINGS.fxFont = font;
}

function applyScale(val) {
  // zoom не работает в Electron — используем transform на #app
  var app = document.getElementById('app');
  if (app) {
    var s = parseFloat(val);
    app.style.transform = s === 1 ? '' : 'scale(' + s + ')';
    app.style.transformOrigin = 'top left';
    app.style.width  = s === 1 ? '' : Math.round(100/s) + 'vw';
    app.style.height = s === 1 ? '' : Math.round(100/s) + 'vh';
  }
  APP_SETTINGS.uiScale = val;
  saveSettings();
}

function saveFx() {
  var get = function(id) { var el = document.getElementById(id); return el ? el.value : null; };
  var particles = get('fx-particles');
  var speed     = get('fx-speed');
  var scanlines = get('fx-scanlines');
  var font      = get('fx-font');
  if (particles) { APP_SETTINGS.fxParticles = particles; if(window.CANVAS_API) CANVAS_API.setMode(particles); }
  if (speed)     { APP_SETTINGS.fxSpeed = parseFloat(speed); if(window.CANVAS_API) CANVAS_API.setSpeed(speed); }
  if (scanlines) APP_SETTINGS.fxScanlines = scanlines;
  if (font)      { APP_SETTINGS.fxFont = font; applyFont(font); }
  var scanEl = document.getElementById('scanlines');
  if (scanEl) scanEl.style.opacity = (scanlines === 'off') ? '0' : '1';
  saveSettings();
}

function initSettingsTab() {
  var s = APP_SETTINGS;
  // Цвета
  if (s.colors) {
    var acEl = document.getElementById('color-accent');
    var ac2El= document.getElementById('color-accent2');
    var opEl = document.getElementById('bg-opacity');
    var opD  = document.getElementById('opacity-display');
    if (acEl)  acEl.value  = s.colors.ac  || '#00f0ff';

  }
  // FX
  if (s.fxParticles) { var el=document.getElementById('fx-particles'); if(el) el.value=s.fxParticles; }
  if (s.fxSpeed)     { var el=document.getElementById('fx-speed');     if(el){ el.value=s.fxSpeed; var d=document.getElementById('speed-display'); if(d) d.textContent=parseFloat(s.fxSpeed).toFixed(1); } }
  if (s.fxScanlines) { var el=document.getElementById('fx-scanlines'); if(el) el.value=s.fxScanlines; }

  var cur = s.theme || '';

async function loadSettings() {
  try {
    var s = await ipc.invoke('read-settings');
    if (s) APP_SETTINGS = s;

      var THEMES = ['th-cyber','th-hacker','th-blood','th-ocean','th-gold','th-matrix','th-rose','th-ice','th-toxic'];

  { id:'pip',        icon:'📦', name:'pip',               cmd:'diag-check-pip'      },

  { id:'chromedrv',  icon:'⚙',  name:'ChromeDriver',      cmd:'diag-check-chromedrv'},

var diagResults = {};

function diagLog(msg, cls) {
  var log = document.getElementById('diag-log');
  if (!log) return;
  if (log.querySelector('span')) log.innerHTML = '';
  var d = document.createElement('div');
  d.className = 'diag-log-' + (cls||'info');
  d.textContent = msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function diagProgress(pct, label) {
  var wrap = document.getElementById('diag-progress-wrap');
  var bar  = document.getElementById('diag-progress-bar');
  var lbl  = document.getElementById('diag-progress-label');
  var pctEl= document.getElementById('diag-progress-pct');
  if (!wrap) return;
  wrap.style.display = '';
  if (bar)  bar.style.width = pct + '%';
  if (lbl)  lbl.textContent = label || '';
  if (pctEl)pctEl.textContent = pct + '%';
}

function diagRenderList() {
  var list = document.getElementById('diag-list');
  if (!list) return;
  list.innerHTML = '';
  var needInstall = false;
  DIAG_COMPONENTS.forEach(function(c) {
    var r = diagResults[c.id] || { status:'unknown' };
    var row = document.createElement('div');
    row.className = 'diag-row';
    var stCls  = r.status === 'ok' ? 'ok' : r.status === 'wait' ? 'wait' : r.status === 'warn' ? 'warn' : 'err';
    var stText = r.status === 'ok' ? '✓ OK' : r.status === 'wait' ? '...' : r.status === 'warn' ? '⚠ обновить' : '✗ нет';
    if (r.status === 'err' || r.status === 'warn') needInstall = true;
    row.innerHTML =
      '<div class="diag-icon">' + c.icon + '</div>' +
      '<div class="diag-name">' + c.name + '</div>' +
      '<div class="diag-ver">'  + (r.version || '') + '</div>' +
      '<div class="diag-status ' + stCls + '">' + stText + '</div>';
    list.appendChild(row);
  });
  var installBtn = document.getElementById('diag-install-btn');
  if (installBtn) installBtn.disabled = !needInstall;
}

async function initDiag() {
  // Восстанавливаем лог из буфера если установка шла в фоне
  if (DIAG_LOG_BUFFER.length > 0) {
    var log = document.getElementById('diag-log');
    if (log) {
      log.innerHTML = '';
      DIAG_LOG_BUFFER.slice(-200).forEach(function(e) {
        var d = document.createElement('div');
        d.className = 'diag-log-' + (e.cls||'info');
        d.textContent = e.msg;
        log.appendChild(d);
      });
      log.scrollTop = log.scrollHeight;
    }
  }
  // Восстанавливаем состояние кнопок
  var installBtn = document.getElementById('diag-install-btn');
  var checkBtn   = document.getElementById('diag-check-btn');
  if (DIAG_RUNNING) {
    if (installBtn) { installBtn.disabled = true; installBtn.textContent = '⏳ Установка...'; }
    if (checkBtn)   checkBtn.disabled = true;
    diagLogGlobal('⏳ Установка выполняется...', 'step');
  } else {
    diagRenderList();
  }
}

async function diagCheck() {
  if (DIAG_RUNNING) return;
  DIAG_RUNNING = true;
  var checkBtn = document.getElementById('diag-check-btn');
  if (checkBtn) { checkBtn.disabled = true; checkBtn.textContent = '...'; }
  diagLog('Сканирование компонентов...', 'step');
  diagProgress(5, 'Проверка...');

  var total = DIAG_COMPONENTS.length;
  for (var i = 0; i < total; i++) {
    var c = DIAG_COMPONENTS[i];
    diagResults[c.id] = { status:'wait' };
    diagRenderList();
    diagProgress(Math.round((i/total)*80)+5, c.name + '...');
    try {
      var r = await ipc.invoke('diag-check', { component: c.id, pkg: c.pkg });
      diagResults[c.id] = r;
      diagLog((r.status==='ok'?'✓':'✗') + ' ' + c.name + (r.version?' — '+r.version:'') + (r.note?' ('+r.note+')':''), r.status==='ok'?'ok':r.status==='warn'?'warn':'err');
    } catch(e) {
      diagResults[c.id] = { status:'err', note: e.message };
      diagLog('✗ ' + c.name + ': IPC ошибка', 'err');
    }
    diagRenderList();
  }

  diagProgress(100, 'Готово');
  var errors = DIAG_COMPONENTS.filter(function(c){ return diagResults[c.id] && (diagResults[c.id].status==='err'||diagResults[c.id].status==='warn'); });
  if (errors.length === 0) diagLog('Все компоненты в порядке!', 'ok');
  else diagLog('Нужно установить: ' + errors.map(function(c){return c.name;}).join(', '), 'warn');

  DIAG_RUNNING = false;
  if (checkBtn) { checkBtn.disabled = false; checkBtn.textContent = 'Проверить'; }
}

// Глобальный лог установки — не зависит от DOM вкладки
var DIAG_LOG_BUFFER = [];
var DIAG_LISTENERS_ADDED = false;

function diagLogGlobal(msg, cls) {
  DIAG_LOG_BUFFER.push({ msg, cls });
  // Пишем в DOM если вкладка открыта
  var log = document.getElementById('diag-log');
  if (log) {
    if (log.querySelector('span')) log.innerHTML = '';
    // Перерисовываем весь буфер
    DIAG_LOG_BUFFER.slice(-200).forEach(function(e) {
      var d = document.createElement('div');
      d.className = 'diag-log-' + (e.cls||'info');
      d.textContent = e.msg;
      log.appendChild(d);
    });
    log.scrollTop = log.scrollHeight;
  }
}

function diagProgressGlobal(pct, label) {
  // Обновляем DOM если открыт
  var wrap = document.getElementById('diag-progress-wrap');
  var bar  = document.getElementById('diag-progress-bar');
  var lbl  = document.getElementById('diag-progress-label');
  var pctEl= document.getElementById('diag-progress-pct');
  if (wrap) wrap.style.display = '';
  if (bar)  bar.style.width = pct + '%';

    navBtn.querySelector('.nav-icon').textContent = pct >= 100 ? '✓' : '⏳';

async function diagInstallAll() {
  if (DIAG_RUNNING) return;
  DIAG_RUNNING = true;
  DIAG_LOG_BUFFER = [];

  var installBtn = document.getElementById('diag-install-btn');
  var checkBtn   = document.getElementById('diag-check-btn');
  if (installBtn) { installBtn.disabled = true; installBtn.textContent = '⏳'; }
  if (checkBtn)   checkBtn.disabled = true;

  // Вешаем слушатели один раз глобально
  if (!DIAG_LISTENERS_ADDED) {
    DIAG_LISTENERS_ADDED = true;
    ipc.on('diag-log',      function(_, d) { diagLogGlobal(d.msg, d.type||'info'); });
    ipc.on('diag-progress', function(_, d) { diagProgressGlobal(d.pct, d.label); });
  }

  var toInstall = DIAG_COMPONENTS.filter(function(c){
    return diagResults[c.id] && (diagResults[c.id].status==='err' || diagResults[c.id].status==='warn');
  });

  diagLogGlobal('Установка ' + toInstall.length + ' компонентов...', 'step');
  diagProgressGlobal(5, 'Запуск...');

  try {
    var res = await ipc.invoke('diag-install', { components: toInstall.map(function(c){return c.id;}) });
    diagLogGlobal(res.ok ? '✓ Готово!' : '✗ ' + res.msg, res.ok ? 'ok' : 'err');
  } catch(e) {
    diagLogGlobal('✗ ' + e.message, 'err');
  }

  DIAG_RUNNING = false;
  var navBtn = document.querySelector('[data-tab="diag"]');
  if (navBtn) navBtn.querySelector('.nav-icon').textContent = '🔧';
  if (installBtn) { installBtn.textContent = 'Установить всё'; }
  if (checkBtn)   checkBtn.disabled = false;

var ALL_LOGS = [];

// Живые обновления — когда открыта вкладка логов
ipc.on('log-entry', function(_, entries) {
  if (!Array.isArray(entries)) return;
  entries.forEach(function(e) {
    // Не дублируем
    if (!ALL_LOGS.find(function(x){ return x.ts === e.ts && x.msg === e.msg; })) {
      ALL_LOGS.push(e);
    }
  });
  if (ALL_LOGS.length > 500) ALL_LOGS = ALL_LOGS.slice(-500);
  // Обновляем DOM если вкладка открыта
  var wrap = document.getElementById('logs-wrap');
  if (wrap) renderLogsDOM(wrap);
  // Мигаем иконкой в навбаре
  var ico = document.getElementById('logs-nav-icon');
  if (ico && document.querySelector('[data-tab="logs"]') &&
      !document.querySelector('[data-tab="logs"].is-active')) {
    ico.textContent = '🔴';
    setTimeout(function(){ ico.textContent = '📋'; }, 2000);
  }
});

async function initLogs() {
  // Загружаем все логи из main процесса
  try {
    var logs = await ipc.invoke('read-logs');
    if (Array.isArray(logs)) ALL_LOGS = logs;
  } catch(e) {}
  var wrap = document.getElementById('logs-wrap');
  if (wrap) renderLogsDOM(wrap);
  // Сбрасываем иконку
  var ico = document.getElementById('logs-nav-icon');
  if (ico) ico.textContent = '📋';
}

function renderLogs() {
  var wrap = document.getElementById('logs-wrap');
  if (wrap) renderLogsDOM(wrap);
}

function renderLogsDOM(wrap) {
  var filterBrowser = document.getElementById('log-filter-browser');
  var filterLevel   = document.getElementById('log-filter-level');
  var fb = filterBrowser ? filterBrowser.value : '';
  var fl = filterLevel   ? filterLevel.value   : '';

  var logs = ALL_LOGS.slice().reverse(); // новые сверху
  if (fb) logs = logs.filter(function(l){ return l.browser === fb; });
  if (fl === 'error') logs = logs.filter(function(l){ return l.msg.toLowerCase().includes('error') || l.msg.includes('[error]'); });
  if (fl === 'engine') logs = logs.filter(function(l){ return l.msg.includes('[engine]') || l.msg.includes('[start]'); });

  if (logs.length === 0) {
    wrap.innerHTML = '<div style="color:var(--tx2)">Нет записей' + (fb||fl ? ' по фильтру' : '') + '.</div>';
    return;
  }

  var BROWSER_COLORS = { chrome:'#4285F4', msedge:'#0078D7', firefox:'#FF9500', yandex:'#FC3F1D' };
  var html = '';
  logs.forEach(function(e) {
    var time = new Date(e.ts).toLocaleTimeString('ru-RU');
    var isErr  = e.msg.includes('error') || e.msg.includes('Error') || e.msg.includes('[error]');
    var isOk   = e.msg.includes('[start]') || e.msg.includes('OK') || e.msg.includes('✓');
    var color  = isErr ? 'var(--red)' : isOk ? 'var(--grn)' : 'var(--tx2)';
    var bcolor = BROWSER_COLORS[e.browser] || 'var(--ac)';
    html += '<div style="display:flex;gap:8px;align-items:baseline;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)">' +
      '<span style="color:rgba(255,255,255,.25);font-size:9px;flex-shrink:0;width:52px">' + time + '</span>' +
      '<span style="color:' + bcolor + ';font-size:9px;flex-shrink:0;width:44px">' + (e.browser||'') + '</span>' +
      '<span style="color:rgba(var(--acr),.5);font-size:9px;flex-shrink:0;width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + (e.profile||'') + '">' + (e.profile||'') + '</span>' +
      '<span style="color:' + color + ';flex:1;word-break:break-all">' + escHtml(e.msg) + '</span>' +
      '</div>';
  });
  wrap.innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function clearLogs() {
  try { await ipc.invoke('clear-logs'); } catch(e) {}
  ALL_LOGS = [];
  renderLogs();
  showToast('Логи очищены');
}

  { vendor: 'Google Inc. (AMD)',    renderer: 'ANGLE (AMD, AMD Radeon RX 6600 Direct3D11 vs_5_0 ps_5_0, D3D11)' },

  { vendor: 'Google Inc. (AMD)',    renderer: 'ANGLE (AMD, AMD Radeon RX 5700 XT Direct3D11 vs_5_0 ps_5_0, D3D11)' },
];

var FP_PLATFORMS = ['Win32', 'Win32', 'Win32', 'Win64']; // Win32 чаще — реалистичнее

var FP_RESOLUTIONS = [
  '1920,1080', '1920,1080', '1920,1080', // самые популярные чаще
  '2560,1440', '1366,768', '1536,864',
  '1440,900', '1280,800', '1600,900',
];

var FP_UA_CHROME_VERSIONS = ['122', '123', '124', '125', '126', '130', '131', '132'];

function fpRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateFingerprint() {
  var cfg = {};
  try {
    var s = JSON.parse(localStorage.getItem('artofix_fp_settings') || '{}');
    cfg = s;
  } catch(e) {}

  var fp = {};

  if (cfg.webgl !== false) {
    var gpu = fpRandom(FP_WEBGL_VENDORS);
    fp.webgl_vendor   = gpu.vendor;
    fp.webgl_renderer = gpu.renderer;
  }

  if (cfg.platform !== false) {
    fp.platform = fpRandom(FP_PLATFORMS);
  }

  if (cfg.canvas !== false) {
    // Небольшой шум в canvas — уникальный для каждой сессии
    fp.canvas_noise = Math.floor(Math.random() * 100);
  }

  if (cfg.resolution) {
    var res = fpRandom(FP_RESOLUTIONS);
    fp.resolution = res;
  }

  if (cfg.ua) {
    var ver = fpRandom(FP_UA_CHROME_VERSIONS);
    fp.user_agent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/' + ver + '.0.0.0 Safari/537.36';
  }

  return fp;
}

function saveFpConfig() {
  var cfg = {
    webgl:      document.getElementById('fp-webgl')?.checked      !== false,
    platform:   document.getElementById('fp-platform')?.checked   !== false,
    canvas:     document.getElementById('fp-canvas')?.checked     !== false,
    resolution: document.getElementById('fp-resolution')?.checked || false,
    ua:         document.getElementById('fp-ua')?.checked         || false,
  };
  // Сохраняем в APP_SETTINGS
  APP_SETTINGS.fingerprint = cfg;
  saveSettings();
  showToast('Fingerprint сохранён', 'ok');
}

function loadFpConfig() {
  var cfg = APP_SETTINGS.fingerprint || {};
  var set = function(id, val) { var el = document.getElementById(id); if (el) el.checked = val !== false; };
  set('fp-webgl',      cfg.webgl      !== false);
  set('fp-platform',   cfg.platform   !== false);
  set('fp-canvas',     cfg.canvas     !== false);
  set('fp-resolution', cfg.resolution === true);
  set('fp-ua',         cfg.ua         === true);
}

function previewFingerprint() {
  var fp = generateFingerprint();
  var el = document.getElementById('fp-preview');
  if (!el) return;
  el.style.display = '';
  el.innerHTML =
    '<div><span style="color:var(--ac)">WebGL vendor:</span>   ' + (fp.webgl_vendor   || 'не меняется') + '</div>' +
    '<div><span style="color:var(--ac)">WebGL renderer:</span> ' + (fp.webgl_renderer || 'не меняется') + '</div>' +
    '<div><span style="color:var(--ac)">Platform:</span>       ' + (fp.platform       || 'не меняется') + '</div>' +
    '<div><span style="color:var(--ac)">Canvas noise:</span>   ' + (fp.canvas_noise !== undefined ? fp.canvas_noise : 'не меняется') + '</div>' +
    '<div><span style="color:var(--ac)">Resolution:</span>     ' + (fp.resolution    || 'из конфига') + '</div>' +
    '<div><span style="color:var(--ac)">User-Agent:</span>     ' + (fp.user_agent    || 'из конфига') + '</div>';
}

// Хук — перед каждым запуском браузера генерируем fingerprint и пишем в config
var _origLaunchBrowser = null;
(function() {
  var orig = launchBrowser;
  launchBrowser = async function(url, profile, browser, bypass) {
    // Генерируем fingerprint и сохраняем в config.json временно
    try {
      var fp = generateFingerprint();
      if (Object.keys(fp).length > 0) {
        var cfg = await ipc.invoke('read-config');
        cfg = cfg || {};
        cfg.fingerprint = fp;
        // Если fp переопределяет разрешение — обновляем resolution
        if (fp.resolution) cfg.resolution = fp.resolution;
        if (fp.user_agent)  cfg.user_agent  = fp.user_agent;
        await ipc.invoke('write-config', cfg);
      }
    } catch(e) {}
    return orig.call(this, url, profile, browser, bypass);
  };
})();

function renderCbnTests(results) {
  var list = document.getElementById('cbn-tests-list');
  if (!list) return;
  list.innerHTML = '';
  CBN_TARGETS.forEach(function(t, i) {
    var r = results[i] || {};
    var row = document.createElement('div');
    row.className = 'cbn-test-row';
    var dotCls = r.status === 'ok' ? 'ok' : r.status === 'err' ? 'err' : r.status === 'wait' ? 'wait' : '';
    var ping = r.ping ? (' ' + r.ping + 'мс') : '';
    row.innerHTML = '<div class="cbn-dot ' + dotCls + '" id="cbn-dot-' + i + '"></div>' +
      '<span style="color:var(--ac)">' + t.icon + '</span>' +
      '<span style="flex:1;color:var(--tx)">' + t.name + '</span>' +
      '<span style="color:var(--tx2);font-size:9px" id="cbn-res-' + i + '">' + (r.msg || '—') + ping + '</span>';
    list.appendChild(row);
  });
}

async function cheburnetCheck() {
  cheburnetRunTests();
}

async function cheburnetRunTests() {
  var results = CBN_TARGETS.map(function() { return { status:'wait', msg:'проверка...' }; });
  renderCbnTests(results);

  // TCP ping с повторной попыткой при неудаче — убирает ложные срабатывания
  async function tcpCheck(target) {
    var r1 = await ipc.invoke('cbn-ping', { host: target.host, port: target.port || 443 }).catch(function(){ return { ok: false }; });
    if (r1.ok) return r1;
    // Первый раз не прошёл — ждём 800мс и пробуем ещё раз
    await new Promise(function(r){ setTimeout(r, 800); });
    var r2 = await ipc.invoke('cbn-ping', { host: target.host, port: target.port || 443 }).catch(function(){ return { ok: false }; });
    return r2;
  }

  var blocked = 0;
  for (var i = 0; i < CBN_TARGETS.length; i++) {
    var t = CBN_TARGETS[i];
    try {
      var r = await tcpCheck(t);
      results[i] = r.ok
        ? { status: 'ok',  msg: 'доступен', ping: r.ping }
        : { status: 'err', msg: r.err === 'TIMEOUT' ? 'таймаут' : 'заблокирован' };
      if (!r.ok) blocked++;
    } catch(e) {
      results[i] = { status:'err', msg:'ошибка' };
      blocked++;
    }
    var dot = document.getElementById('cbn-dot-' + i);
    var res = document.getElementById('cbn-res-' + i);
    if (dot) dot.className = 'cbn-dot ' + results[i].status;
    if (res) res.textContent = results[i].msg + (results[i].ping ? ' ' + results[i].ping + 'мс' : '');
  }

  var pct   = Math.round(blocked / CBN_TARGETS.length * 100);
  var icon  = document.getElementById('cbn-threat-icon');
  var label = document.getElementById('cbn-threat-label');
  var sub   = document.getElementById('cbn-threat-sub');
  var bar   = document.getElementById('cbn-threat-bar');

  if (bar) {
    bar.style.width = pct + '%';
    bar.style.background = pct === 0
      ? 'linear-gradient(90deg,var(--grn),#00cc88)'
      : pct < 50
      ? 'linear-gradient(90deg,var(--ylw),#ff8800)'
      : 'linear-gradient(90deg,var(--red),#ff6600)';
  }
  if (pct === 0) {
    if (icon)  icon.textContent  = '✅';
    if (label) { label.textContent = 'Всё доступно'; label.style.color = 'var(--grn)'; }
    if (sub)   sub.textContent   = 'Блокировок не обнаружено.';
  } else if (pct < 50) {
    if (icon)  icon.textContent  = '⚠️';
    if (label) { label.textContent = 'Частичная блокировка ' + blocked + '/' + CBN_TARGETS.length; label.style.color = 'var(--ylw)'; }
    if (sub)   sub.textContent   = 'Некоторые сервисы недоступны. Запусти Zapret.';
    if (CBN_SETTINGS.autorestart) { zapretStart(); showToast('Zapret запущен автоматически', 'ok'); }
  } else {
    if (icon)  icon.textContent  = '🚨';
    if (label) { label.textContent = 'ЧЕБУРНЕТ ' + blocked + '/' + CBN_TARGETS.length; label.style.color = 'var(--red)'; }
    if (sub)   sub.textContent   = 'Массовые блокировки. Аварийный режим...';
    if (CBN_SETTINGS.autorestart) cheburnetEmergency();
  }
}

function startCbnMonitor() {
  if (CBN_MONITOR_TIMER) clearInterval(CBN_MONITOR_TIMER);
  var interval = (CBN_SETTINGS.interval || 30) * 1000;
  CBN_MONITOR_TIMER = setInterval(function() {
    // Проверяем YouTube по TCP — надёжный индикатор
    ipc.invoke('cbn-ping', { host: 'www.youtube.com', port: 443 }).then(function(r) {
      if (!r.ok && CBN_SETTINGS.autorestart) {
        zapretStart();
        showToast('Чебурнет — Zapret запущен', 'ok');
      }
    }).catch(function(){});
  }, interval);
}

function stopCbnMonitor() {
  if (CBN_MONITOR_TIMER) { clearInterval(CBN_MONITOR_TIMER); CBN_MONITOR_TIMER = null; }
}

async function cheburnetApplyDns() {
  var dns1 = document.getElementById('cbn-dns1')?.value;
  var dns2 = document.getElementById('cbn-dns2')?.value;
  var st = document.getElementById('cbn-dns-status');
  if (st) { st.textContent = '⏳ Применяем DNS...'; st.style.color = 'var(--ac)'; }
  try {
    var r = await ipc.invoke('cbn-set-dns', { dns1, dns2 });
    if (st) { st.textContent = r.ok ? '✓ DNS успешно изменён на ' + dns1 + ' / ' + dns2 : '✗ Ошибка: ' + r.msg; st.style.color = r.ok ? 'var(--grn)' : 'var(--red)'; }
    if (r.ok) showToast('🔒 DNS изменён: ' + dns1, 'ok');
  } catch(e) { if(st) { st.textContent = '✗ ' + e.message; st.style.color='var(--red)'; } }
}

async function cheburnetResetDns() {
  var st = document.getElementById('cbn-dns-status');
  if (st) { st.textContent = '⏳ Сбрасываем DNS...'; st.style.color='var(--ac)'; }
  try {
    var r = await ipc.invoke('cbn-reset-dns');
    if (st) { st.textContent = r.ok ? '✓ DNS сброшен (автоматический от провайдера)' : '✗ ' + r.msg; st.style.color = r.ok ? 'var(--grn)' : 'var(--red)'; }
  } catch(e) { if(st) { st.textContent='✗ '+e.message; st.style.color='var(--red)'; } }
}

async function cheburnetEmergency() {
  var logEl = document.getElementById('cbn-emergency-log');
  if (logEl) { logEl.style.display = ''; logEl.innerHTML = ''; }
  function eLog(msg, color) {
    if (!logEl) return;
    var line = document.createElement('div');
    line.style.color = color || 'var(--tx2)';
    line.textContent = msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }
  eLog('🆘 Аварийный режим активирован...', 'var(--red)');
  eLog('■ Останавливаем текущий Zapret...', 'var(--tx2)');
  await ipc.invoke('zapret-stop').catch(()=>{});
  await new Promise(r => setTimeout(r, 500));
  eLog('▶ Перезапускаем Zapret...', 'var(--ac)');
  await ipc.invoke('zapret-start').catch(()=>{});
  eLog('🔒 Меняем DNS на Cloudflare (1.1.1.1)...', 'var(--ac)');
  var dnsR = await ipc.invoke('cbn-set-dns', { dns1:'1.1.1.1', dns2:'1.0.0.1' }).catch(()=>({ok:false}));
  eLog(dnsR.ok ? '✓ DNS изменён' : '⚠ DNS не удалось изменить (нужны права)', dnsR.ok ? 'var(--grn)' : 'var(--ylw)');
  await new Promise(r => setTimeout(r, 1000));
  eLog('🌐 Проверяем доступность...', 'var(--tx2)');
  var ping = await ipc.invoke('cbn-ping', { host:'www.google.com', port:443 }).catch(()=>({ok:false}));
  eLog(ping.ok ? '✅ Соединение восстановлено!' : '⚠ Соединение всё ещё ограничено. Попробуй VPN.', ping.ok ? 'var(--grn)' : 'var(--ylw)');
  showToast(ping.ok ? '✅ Аварийный режим — OK' : '⚠ Частичное восстановление', ping.ok ? 'ok' : '');
}

async function cheburnetFullCheck() {
  showToast('🔬 Полная диагностика запущена...', 'ok');
  await cheburnetRunTests();
}

// =====================================================
//   ZAPRET AUTO-UPDATE
// =====================================================
var ZU_STATE = { checking: false, updating: false, latestTag: null, assetUrl: null, assetName: null };

function zuLog(msg, type) {
  var box = document.getElementById('zu-log');
  if (!box) return;
  var span = document.createElement('div');
  span.style.color = type === 'ok' ? 'var(--grn)' : type === 'err' ? 'var(--red)' : type === 'warn' ? '#ffcc00' : 'var(--tx2)';
  span.textContent = msg;
  box.appendChild(span);
  box.scrollTop = box.scrollHeight;
}

function zuProgress(pct, label) {
  var bar = document.getElementById('zu-bar');
  var pctEl = document.getElementById('zu-pct');
  var lbl = document.getElementById('zu-status-label');
  if (bar)   bar.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (lbl)   lbl.textContent = label || '';
}

function zuShow(cardId) {
  ['zu-status-card','zu-update-card','zu-ok-card','zu-changelog-card'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = id === cardId ? '' : 'none';
  });
}

async function initZapretUpdate() {
  // Читаем текущую версию из version.txt внутри папки Zapret
  try {
    var r = await ipc.invoke('zapret-version');
    var el = document.getElementById('zu-current');
    var pe = document.getElementById('zu-path');
    if (el) el.textContent = r.version || 'Не определена';
    if (pe) pe.textContent = r.path || '—';
  } catch(e) {}
  zuShow(null);
}

async function zapretCheckUpdate() {
  if (ZU_STATE.checking || ZU_STATE.updating) return;
  ZU_STATE.checking = true;
  var btn = document.getElementById('zu-btn-check');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Проверяем...'; }

  // показываем прогресс-карту
  zuShow('zu-status-card');
  var logBox = document.getElementById('zu-log');
  if (logBox) logBox.innerHTML = '';
  zuProgress(10, 'Подключаемся к GitHub...');
  zuLog('🔍 Запрос к GitHub API...', 'info');

  try {
    var res = await ipc.invoke('zapret-check-update');
    if (!res.ok) {
      zuLog('✗ Ошибка: ' + res.msg, 'err');
      zuProgress(0, 'Ошибка');
      ZU_STATE.checking = false;
      if (btn) { btn.disabled = false; btn.textContent = '🔍 Проверить снова'; }
      return;
    }

    zuProgress(60, 'Получен ответ...');
    zuLog('✓ Последняя версия: ' + res.latestTag, 'ok');
    zuLog('  Дата выхода: ' + res.publishedAt, 'info');
    zuLog('  Файл: ' + res.assetName, 'info');

    // Обновляем карточку "последняя версия"
    var latEl  = document.getElementById('zu-latest');
    var datEl  = document.getElementById('zu-date');
    var sizEl  = document.getElementById('zu-size');
    if (latEl) latEl.textContent = res.latestTag;
    if (datEl) datEl.textContent = res.publishedAt;
    if (sizEl) sizEl.textContent = res.assetSizeMb ? res.assetSizeMb + ' МБ' : '—';

    ZU_STATE.latestTag  = res.latestTag;
    ZU_STATE.assetUrl   = res.assetUrl;
    ZU_STATE.assetName  = res.assetName;

    zuProgress(100, 'Готово');

    if (res.needsUpdate) {
      zuLog('🆕 Доступно обновление! ' + res.currentVersion + ' → ' + res.latestTag, 'warn');
      zuShow('zu-update-card');
      var desc = document.getElementById('zu-update-desc');
      var clog = document.getElementById('zu-changelog');
      if (desc) desc.textContent = 'Текущая версия: ' + (res.currentVersion || '?') + '  →  Новая: ' + res.latestTag;
      if (clog && res.body) {
        // changelog — берём первые 20 строк
        clog.textContent = res.body.split('\n').slice(0, 20).join('\n');
        document.getElementById('zu-changelog-card').style.display = '';
      }
    } else {
      zuLog('✓ Zapret актуален', 'ok');
      zuShow('zu-ok-card');
    }
  } catch(e) {
    zuLog('✗ IPC ошибка: ' + e.message, 'err');
  }

  ZU_STATE.checking = false;
  if (btn) { btn.disabled = false; btn.textContent = '🔍 Проверить снова'; }
}

async function zapretDoUpdate() {
  if (ZU_STATE.updating) return;
  if (!ZU_STATE.assetUrl) { showToast('Сначала проверь обновление', 'err'); return; }
  if (!confirm('Обновить Zapret до ' + ZU_STATE.latestTag + '?\n\nZapret будет остановлен на время обновления.')) return;

  ZU_STATE.updating = true;
  var btn = document.getElementById('zu-btn-update');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Обновляем...'; }

  // Останавливаем Zapret
  try { await ipc.invoke('zapret-stop'); } catch(e) {}

  zuShow('zu-status-card');
  var logBox = document.getElementById('zu-log');
  if (logBox) logBox.innerHTML = '';
  zuProgress(5, 'Начинаем обновление...');
  zuLog('■ Zapret остановлен', 'info');

  // Слушаем прогресс скачивания
  ipc.removeAllListeners('zapret-dl-progress');
  ipc.on('zapret-dl-progress', function(e, d) {
    zuProgress(5 + Math.round(d.pct * 0.7), 'Скачиваем... ' + d.downloaded + ' / ' + d.total);
    zuLog('↓ ' + d.downloaded + ' МБ / ' + d.total + ' МБ (' + Math.round(d.pct) + '%)', 'info');
  });

  try {
    var res = await ipc.invoke('zapret-do-update', { url: ZU_STATE.assetUrl, name: ZU_STATE.assetName, tag: ZU_STATE.latestTag });
    ipc.removeAllListeners('zapret-dl-progress');

    if (!res.ok) {
      zuLog('✗ Ошибка: ' + res.msg, 'err');
      zuProgress(0, 'Ошибка');
      ZU_STATE.updating = false;
      if (btn) { btn.disabled = false; btn.textContent = '⬇ Попробовать снова'; }
      return;
    }

    zuProgress(100, 'Готово!');
    zuLog('✓ Zapret ' + ZU_STATE.latestTag + ' установлен!', 'ok');
    zuLog('  Файлы обновлены в папке Zapret\\', 'info');
    showToast('✅ Zapret обновлён до ' + ZU_STATE.latestTag + '!', 'ok');

    // Обновляем текущую версию
    var el = document.getElementById('zu-current');
    if (el) el.textContent = ZU_STATE.latestTag;

    document.getElementById('zu-update-card').style.display = 'none';
    document.getElementById('zu-ok-card').style.display = '';
  } catch(e) {
    zuLog('✗ IPC ошибка: ' + e.message, 'err');
    ipc.removeAllListeners('zapret-dl-progress');
  }

  ZU_STATE.updating = false;
  if (btn) { btn.disabled = false; btn.textContent = '⬇ Скачать и установить'; }
}

function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('is-open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('is-open');
  document.getElementById('modal-box').innerHTML = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
